function render(filter="all",search=""){

const container=document.getElementById("tools")
container.innerHTML=""

tools.filter(t=>{
const f=filter==="all"||t.cat===filter
const s=t.name.toLowerCase().includes(search)||t.desc.toLowerCase().includes(search)
return f && s
}).forEach(tool=>{

container.innerHTML+=`

<div class="card">

<div class="card-top">

<img src="${tool.logo}" class="card-img"
onerror="this.src='https://ui-avatars.com/api/?name=${tool.name}&background=6366f1&color=fff'">

<div>

<div class="tag">${tool.cat}</div>

<h3>${tool.name}
<span class="price ${tool.price}">
${tool.price.toUpperCase()}
</span>
</h3>

</div>

</div>

<p>${tool.desc}</p>

<div class="card-footer">
<a class="visit-btn" href="${tool.link}" target="_blank">Visit</a>
</div>

</div>

`

})

}

render()

document.getElementById("search").addEventListener("input",e=>{
render("all",e.target.value.toLowerCase())
})

document.querySelectorAll(".cat-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
render(btn.dataset.filter,document.getElementById("search").value.toLowerCase())
}
})
